<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Shield AI | Enterprise Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white selection:bg-blue-500/30">

    <div id="scroll-progress" class="fixed top-0 left-0 h-1 bg-blue-600 z-50 transition-all duration-150"></div>

    <nav class="fixed w-full z-40 border-b border-white/5 transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3 group cursor-pointer">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg group-hover:scale-110 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <span class="text-xl font-bold tracking-tighter">GUARDSHIELD</span>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full font-medium transition active:scale-95">Get Started</button>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <section class="max-w-5xl mx-auto text-center">
            <h1 class="text-6xl md:text-8xl font-black mb-8 tracking-tight">Secure your <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Future</span></h1>
            <p class="text-gray-400 text-xl max-w-2xl mx-auto mb-12">Automated threat detection powered by the world's most advanced AI models.</p>
            
            <div class="bg-white/5 border border-white/10 p-8 rounded-3xl max-w-lg mx-auto backdrop-blur-xl">
                <div id="status-text" class="text-sm font-mono mb-4 text-blue-400 uppercase tracking-widest">System Ready</div>
                <div class="h-2 bg-white/10 rounded-full overflow-hidden mb-8">
                    <div id="scan-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div>
                </div>
                <button id="scan-init" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:invert transition">Run AI Security Audit</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
